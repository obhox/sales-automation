<!-- @dsCard group="Spacing" viewport="700x150" name="Radius scale" subtitle="Restrained corners — controls 8px, cards 10px, modals 14px" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface);font-family:var(--font-sans)}
.wrap{padding:20px 24px;display:flex;gap:16px;align-items:flex-start}
.item{display:flex;flex-direction:column;align-items:center;gap:8px}
.sq{width:60px;height:60px;background:var(--cobalt-50);border:1.5px solid var(--cobalt-400)}
.v{font-size:11px;font-weight:600;color:var(--text-strong)}
.n{font-size:10px;font-family:var(--font-mono);color:var(--text-subtle)}</style></head>
<body><div class="wrap">
<div class="item"><div class="sq" style="border-radius:var(--radius-sm)"></div><span class="v">sm</span><span class="n">5px</span></div>
<div class="item"><div class="sq" style="border-radius:var(--radius-md)"></div><span class="v">md</span><span class="n">8px</span></div>
<div class="item"><div class="sq" style="border-radius:var(--radius-lg)"></div><span class="v">lg</span><span class="n">10px</span></div>
<div class="item"><div class="sq" style="border-radius:var(--radius-xl)"></div><span class="v">xl</span><span class="n">14px</span></div>
<div class="item"><div class="sq" style="border-radius:var(--radius-2xl)"></div><span class="v">2xl</span><span class="n">20px</span></div>
<div class="item"><div class="sq" style="border-radius:var(--radius-pill)"></div><span class="v">pill</span><span class="n">999px</span></div>
<div class="item"><div class="sq" style="border-radius:var(--radius-full)"></div><span class="v">full</span><span class="n">50%</span></div>
</div></body></html>
