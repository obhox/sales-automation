<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface);font-family:var(--font-sans)}
.row{display:flex;gap:12px;padding:22px 24px;align-items:flex-end;height:96px;box-sizing:border-box}
.bar{flex:1;border-radius:6px 6px 0 0;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:10px;font-weight:600;color:#fff}</style></head>
<body><div class="row">
<div class="bar" style="background:var(--viz-1);height:100%">1</div>
<div class="bar" style="background:var(--viz-2);height:78%">2</div>
<div class="bar" style="background:var(--viz-3);height:64%">3</div>
<div class="bar" style="background:var(--viz-4);height:50%">4</div>
<div class="bar" style="background:var(--viz-5);height:38%">5</div>
<div class="bar" style="background:var(--viz-6);height:26%">6</div>
</div></body></html>
