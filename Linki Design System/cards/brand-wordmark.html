<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface);font-family:var(--font-sans)}
.wrap{padding:24px;display:flex;gap:40px;align-items:center}
.brand{display:flex;align-items:center;gap:11px}
.glyph{width:34px;height:34px;border-radius:9px;background:var(--cobalt-600);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-raised)}
.mark{font-size:26px;font-weight:600;letter-spacing:-.02em;color:var(--text-strong)}
.dark{background:var(--slate-900);border-radius:var(--radius-lg);padding:16px 20px}
.dark .mark{color:#fff}
.note{font-size:11px;color:var(--text-subtle);max-width:150px;line-height:1.4}</style></head>
<body><div class="wrap">
<div class="brand"><span class="glyph"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.7 1.7"/><path d="M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7l1.7-1.7"/></svg></span><span class="mark">Linki</span></div>
<div class="brand dark"><span class="glyph" style="background:#fff"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--cobalt-600)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.7 1.7"/><path d="M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7l1.7-1.7"/></svg></span><span class="mark">Linki</span></div>
<span class="note">Placeholder — the glyph is a generic link mark, not an official logo.</span>
</div></body></html>
