<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base, 8px rhythm — the layout grid" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface);font-family:var(--font-sans)}
.wrap{padding:20px 24px;display:flex;gap:14px;align-items:flex-end}
.item{display:flex;flex-direction:column;align-items:center;gap:6px}
.bar{background:var(--cobalt-500);border-radius:3px;width:100%}
.box{width:44px;display:flex;flex-direction:column;align-items:center}
.n{font-size:10px;font-family:var(--font-mono);color:var(--text-subtle)}
.v{font-size:11px;font-weight:600;color:var(--text-strong)}</style></head>
<body><div class="wrap">
<div class="box"><div class="bar" style="height:4px"></div><span class="v">1</span><span class="n">4px</span></div>
<div class="box"><div class="bar" style="height:8px"></div><span class="v">2</span><span class="n">8px</span></div>
<div class="box"><div class="bar" style="height:12px"></div><span class="v">3</span><span class="n">12px</span></div>
<div class="box"><div class="bar" style="height:16px"></div><span class="v">4</span><span class="n">16px</span></div>
<div class="box"><div class="bar" style="height:24px"></div><span class="v">6</span><span class="n">24px</span></div>
<div class="box"><div class="bar" style="height:32px"></div><span class="v">8</span><span class="n">32px</span></div>
<div class="box"><div class="bar" style="height:48px"></div><span class="v">12</span><span class="n">48px</span></div>
<div class="box"><div class="bar" style="height:64px"></div><span class="v">16</span><span class="n">64px</span></div>
</div></body></html>
