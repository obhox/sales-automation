<!-- @dsCard group="Colors" viewport="700x150" name="Accent · Signal Teal" subtitle="Growth / connected accent — --teal-50…900" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface);font-family:var(--font-sans)}
.row{display:flex;padding:20px 24px}
.sw{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 9px;box-sizing:border-box}
.sw:first-child{border-radius:var(--radius-md) 0 0 var(--radius-md)}
.sw:last-child{border-radius:0 var(--radius-md) var(--radius-md) 0}
.n{font-size:11px;font-weight:600}.h{font-size:10px;font-family:var(--font-mono);opacity:.85;margin-top:2px}
.star{position:absolute;top:5px;right:7px;font-size:9px;font-weight:700;color:#fff}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--teal-50)"><span class="n" style="color:var(--teal-900)">50</span></div>
<div class="sw" style="background:var(--teal-100)"><span class="n" style="color:var(--teal-900)">100</span></div>
<div class="sw" style="background:var(--teal-200)"><span class="n" style="color:var(--teal-900)">200</span></div>
<div class="sw" style="background:var(--teal-300)"><span class="n" style="color:var(--teal-900)">300</span></div>
<div class="sw" style="background:var(--teal-400)"><span class="n" style="color:var(--teal-900)">400</span></div>
<div class="sw" style="background:var(--teal-500)"><span class="n" style="color:#fff">500</span></div>
<div class="sw" style="position:relative;background:var(--teal-600)"><span class="star">ACCENT</span><span class="n" style="color:#fff">600</span><span class="h" style="color:#fff">#0A877A</span></div>
<div class="sw" style="background:var(--teal-700)"><span class="n" style="color:#fff">700</span></div>
<div class="sw" style="background:var(--teal-800)"><span class="n" style="color:#fff">800</span></div>
<div class="sw" style="background:var(--teal-900)"><span class="n" style="color:#fff">900</span></div>
</div></body></html>
