<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="Modular ~1.2 ratio, base body 14px" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface);font-family:var(--font-sans)}
.wrap{padding:18px 24px;display:flex;flex-direction:column;gap:12px}
.line{display:flex;align-items:baseline;gap:16px}
.tag{font-family:var(--font-mono);font-size:11px;color:var(--text-subtle);width:120px;flex-shrink:0}
.t{color:var(--text-strong);letter-spacing:-.01em}</style></head>
<body><div class="wrap">
<div class="line"><span class="tag">6xl · 56 · hero</span><span class="t" style="font-size:44px;font-weight:600;letter-spacing:-.02em">Automate outbound</span></div>
<div class="line"><span class="tag">4xl · 34 · h1</span><span class="t" style="font-size:34px;font-weight:600;letter-spacing:-.01em">Sequences that reply</span></div>
<div class="line"><span class="tag">2xl · 22 · h3</span><span class="t" style="font-size:22px;font-weight:600">Pipeline overview</span></div>
<div class="line"><span class="tag">lg · 16 · body-lg</span><span class="t" style="font-size:16px;font-weight:400">Emphasized body copy</span></div>
<div class="line"><span class="tag">md · 14 · body</span><span class="t" style="font-size:14px;font-weight:400;color:var(--text)">Base body — 14px regular, 1.5 line-height</span></div>
<div class="line"><span class="tag">sm · 13 · dense</span><span class="t" style="font-size:13px;font-weight:400;color:var(--text-muted)">Dense UI & secondary body</span></div>
<div class="line"><span class="tag">xs · 12 · caption</span><span class="t" style="font-size:12px;font-weight:400;color:var(--text-subtle)">Captions & table meta</span></div>
</div></body></html>
