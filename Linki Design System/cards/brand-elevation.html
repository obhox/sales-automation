<!-- @dsCard group="Brand" viewport="700x160" name="Elevation" subtitle="Soft, single-layer, slate-tinted — raised → floating → popover → modal" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-app);font-family:var(--font-sans)}
.wrap{padding:26px 24px;display:flex;gap:22px;align-items:center}
.item{display:flex;flex-direction:column;align-items:center;gap:10px}
.sq{width:96px;height:64px;background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border-subtle)}
.v{font-size:11px;font-weight:600;color:var(--text-strong)}</style></head>
<body><div class="wrap">
<div class="item"><div class="sq" style="box-shadow:var(--shadow-raised)"></div><span class="v">raised</span></div>
<div class="item"><div class="sq" style="box-shadow:var(--shadow-floating)"></div><span class="v">floating</span></div>
<div class="item"><div class="sq" style="box-shadow:var(--shadow-popover)"></div><span class="v">popover</span></div>
<div class="item"><div class="sq" style="box-shadow:var(--shadow-modal)"></div><span class="v">modal</span></div>
</div></body></html>
