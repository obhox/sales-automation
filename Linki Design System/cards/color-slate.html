<!-- @dsCard group="Colors" viewport="700x170" name="Neutral · Cool Slate" subtitle="Blue-undertoned greys — --slate-0…950" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface);font-family:var(--font-sans)}
.row{display:flex;padding:20px 24px}
.sw{flex:1;height:100px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 8px;box-sizing:border-box}
.sw:first-child{border-radius:var(--radius-md) 0 0 var(--radius-md)}
.sw:last-child{border-radius:0 var(--radius-md) var(--radius-md) 0}
.n{font-size:10px;font-weight:600}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--slate-0);box-shadow:inset 0 0 0 1px var(--border-subtle)"><span class="n" style="color:var(--slate-800)">0</span></div>
<div class="sw" style="background:var(--slate-50)"><span class="n" style="color:var(--slate-800)">50</span></div>
<div class="sw" style="background:var(--slate-100)"><span class="n" style="color:var(--slate-800)">100</span></div>
<div class="sw" style="background:var(--slate-200)"><span class="n" style="color:var(--slate-800)">200</span></div>
<div class="sw" style="background:var(--slate-300)"><span class="n" style="color:var(--slate-800)">300</span></div>
<div class="sw" style="background:var(--slate-400)"><span class="n" style="color:#fff">400</span></div>
<div class="sw" style="background:var(--slate-500)"><span class="n" style="color:#fff">500</span></div>
<div class="sw" style="background:var(--slate-600)"><span class="n" style="color:#fff">600</span></div>
<div class="sw" style="background:var(--slate-700)"><span class="n" style="color:#fff">700</span></div>
<div class="sw" style="background:var(--slate-800)"><span class="n" style="color:#fff">800</span></div>
<div class="sw" style="background:var(--slate-900)"><span class="n" style="color:#fff">900</span></div>
<div class="sw" style="background:var(--slate-950)"><span class="n" style="color:#fff">950</span></div>
</div></body></html>
