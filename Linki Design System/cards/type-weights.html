<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface);font-family:var(--font-sans);color:var(--text-strong)}
.wrap{padding:20px 24px;display:flex;flex-direction:column;gap:12px}
.row{display:flex;gap:28px;align-items:baseline}
.w{font-size:24px;letter-spacing:-.01em}.t{font-size:11px;font-family:var(--font-mono);color:var(--text-subtle);display:block;margin-top:2px}
.eb{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted)}</style></head>
<body><div class="wrap">
<div class="row">
<div><span class="w" style="font-weight:400">Regular</span><span class="t">400 · body</span></div>
<div><span class="w" style="font-weight:500">Medium</span><span class="t">500 · labels</span></div>
<div><span class="w" style="font-weight:600">Semibold</span><span class="t">600 · headings</span></div>
</div>
<div class="eb">Reply rate · overline / eyebrow</div>
</div></body></html>
